<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <title>OS Quiz App</title> <style> body{font-family:Arial;background:#0a0e1a;color:white;padding:20px} button{padding:8px 12px;margin:5px;cursor:pointer} .card{border:1px solid #333;padding:10px;margin:8px;border-radius:8px} .hidden{filter:blur(6px);cursor:pointer} </style> </head> <body> <h2>OS Quiz App</h2> <button onclick="revealAll()">Reveal All</button> <button onclick="hideAll()">Hide All</button> <button onclick="randomQuiz()">Quiz Mode</button> <div id="container"></div> <script> const qa = [ ["What is fork()?","Creates a new process"], ["What is a thread?","Lightweight process"], ["What is paging?","Memory management technique"], ["What is deadlock?","Processes waiting forever"], ["What is FCFS?","First Come First Serve"], ["What is SJF?","Shortest Job First"], ["What is a semaphore?","Synchronization tool"], ["What is IPC?","Inter-process communication"], ["What is virtual memory?","Uses disk as memory"], ["What is thrashing?","Too much paging"], ["What is LRU?","Least Recently Used"], ["What is FIFO?","First In First Out"], ["What is MMU?","Memory Management Unit"], ["What is context switch?","Switch CPU between processes"], ["What is starvation?","Process never gets CPU"], ["What is aging?","Prevents starvation"], ["What is a zombie process?","Dead but exists"], ["What is exec()?","Replaces process"], ["What is pipe?","Communication channel"], ["What is scheduling?","CPU allocation"] ]; let data = qa.map((q,i)=>({ q:q[0], a:q[1], revealed:false, isQuiz:false })); function render(){ const container = document.getElementById("container"); container.innerHTML=""; const quizActive = data.some(d=>d.isQuiz); data.forEach(d=>{ if(quizActive && !d.isQuiz) return; const div = document.createElement("div"); div.className="card"; const q = document.createElement("div"); q.textContent = d.q; const a = document.createElement("div"); a.textContent = d.a; a.className = d.revealed ? "" : "hidden"; a.onclick = ()=>{ d.revealed = !d.revealed; render(); }; div.appendChild(q); div.appendChild(a); container.appendChild(div); }); } function revealAll(){ data.forEach(d=>d.revealed=true); render(); } function hideAll(){ data.forEach(d=>{ d.revealed=false; d.isQuiz=false; }); render(); } function randomQuiz(){ hideAll(); const shuffled = [...data].sort(()=>Math.random()-0.5).slice(0,5); data.forEach(d=>d.isQuiz=false); shuffled.forEach(d=>{ d.isQuiz=true; d.revealed=false; }); render(); } render(); </script> </body> </html>
